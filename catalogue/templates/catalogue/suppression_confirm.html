{% extends 'catalogue/base.html' %}

{% block title %}Supprimer - {{ movie.titre }}{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title"><span class="ico ico-trash ico-rose"></span> Supprimer le film</h1>

    <div class="confirm-box">
        <p>Etes-vous sur de vouloir supprimer definitivement le film :</p>
        <h2>&laquo; {{ movie.titre }} &raquo;</h2>
        <p class="warning">Cette action est irreversible.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content:center">
                <button type="submit" class="btn btn-danger"><span class="ico ico-trash ico-sm"></span> Confirmer la
                    suppression</button>
                <a href="{{ movie.get_absolute_url }}" class="btn btn-outline"><span class="ico ico-cross"></span>
                    Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
